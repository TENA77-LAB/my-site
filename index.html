<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vibe Coder — сайты, интерфейсы и digital-проекты с характером."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Vibe Coder — Portfolio</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          margin: 0;
          padding: 2rem;
          font-family: system-ui, sans-serif;
          background: #030306;
          color: rgba(255, 255, 255, 0.85);
          line-height: 1.55;
        "
      >
        <p style="max-width: 40rem; font-size: 0.95rem">
          Контент сайта подгружается через <strong>Vite + React</strong>. Если этот текст не исчез через пару секунд —
          файл <code>index.html</code> открыт напрямую из папки. Так не работает: нужен dev-сервер.
        </p>
        <p style="max-width: 40rem; margin-top: 1rem; font-size: 0.95rem">
          В терминале в папке проекта выполните:
          <code style="display: block; margin-top: 0.5rem; padding: 0.75rem 1rem; background: #12121a; border-radius: 8px; color: #a5f3fc">npm install</code>
          затем
          <code style="display: block; margin-top: 0.5rem; padding: 0.75rem 1rem; background: #12121a; border-radius: 8px; color: #a5f3fc">npm run dev</code>
          и откройте в браузере адрес вида <strong>http://localhost:5173</strong>.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p style="padding: 2rem; font-family: system-ui; background: #030306; color: #fff">
        Включите JavaScript — сайт на React.
      </p>
    </noscript>
  </body>
</html>
